<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Watchlist - Movie Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">MovieRec Platform</a>
            <div class="d-flex">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h3 class="mb-4">My Saved Movies</h3>
        
        <div class="row" id="watchlistGrid">
            </div>
    </div>

    <script>
        const userEmail = localStorage.getItem('loggedInUser');
        if (!userEmail) {
            window.location.href = 'index.html';
        }

        async function loadWatchlist() {
            try {
                // 1. Get the list of saved movies for this user
                const watchResponse = await fetch('https://movie-rec-system-oanl.onrender.com/api/watchlist/user/' + userEmail);
                const watchlist = await watchResponse.json();

                const grid = document.getElementById('watchlistGrid');

                if (watchlist.length === 0) {
                    grid.innerHTML = '<p class="text-muted">Your watchlist is empty. Go to the dashboard and add some movies!</p>';
                    return;
                }

                // 2. Get all movies to find their titles and images
                const movieResponse = await fetch('https://movie-rec-system-oanl.onrender.com/api/movies');
                const allMovies = await movieResponse.json();

                let html = '';
                
                // 3. Match saved movie IDs with real movie details
                watchlist.forEach(savedItem => {
                    const movie = allMovies.find(m => m.id === savedItem.movieId);
                    if (movie) {
                        html += `
                           <div class="col-6 col-md-4 col-lg-3 mb-4">
                                <div class="card h-100 shadow-sm">
                                    <img src="${movie.posterUrl}" class="card-img-top" alt="Movie Poster" style="height: 350px; object-fit: cover;">
                                    <div class="card-body">
                                        <h5 class="card-title">${movie.title}</h5>
                                        <p class="card-text text-muted mb-1">${movie.year} | ${movie.genre}</p>
                                    </div>
                                    <div class="card-footer bg-white border-top-0 pb-3">
                                        <button class="btn btn-danger btn-sm w-100" onclick="removeFromWatchlist('${movie.id}')">Remove from Watchlist</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                });

                grid.innerHTML = html;

            } catch (error) {
                console.error('Error loading watchlist:', error);
            }
        }

        // Function to remove movie from watchlist
        async function removeFromWatchlist(movieId) {
            try {
                await fetch(`https://movie-rec-system-oanl.onrender.com/api/watchlist/user/${userEmail}/movie/${movieId}`, {
                    method: 'DELETE'
                });
                alert('Movie removed successfully!');
                loadWatchlist(); // Refresh the grid to show updated list
            } catch (error) {
                alert('Error removing movie.');
            }
        }

        // Run when page opens
        window.onload = loadWatchlist;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
