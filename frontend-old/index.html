<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Movie Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm mt-5">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">Welcome Back</h3>
                        
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">Email address</label>
                                <input type="email" id="email" class="form-control" required placeholder="Enter your email">
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Password</label>
                                <input type="password" id="password" class="form-control" required placeholder="Enter your password">
                            </div>

                            <button type="submit" class="btn btn-success w-100">Login</button>
                        </form>

                        <div class="text-center mt-3">
                            <p>Don't have an account? <a href="register.html" class="text-decoration-none">Register here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault(); 
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('https://movie-rec-system-oanl.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });

                const result = await response.text();

                if (response.ok) {
                    alert(result); // Shows "Login successful! Welcome [Name]"
                    // Save user email in browser so we know who is logged in
                    localStorage.setItem('loggedInUser', email);
                    // Go to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    alert(result); // Show wrong password error
                }
            } catch (error) {
                alert('Error connecting to the backend. Is your server running?');
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
