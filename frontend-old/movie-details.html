<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">MovieRec Platform</a>
            <a href="dashboard.html" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h2 id="movieTitle">Loading...</h2>
                        <span class="badge bg-secondary mb-3" id="movieGenre">Genre</span>
                        <span class="badge bg-info text-dark mb-3" id="movieYear">Year</span>
                        <p id="movieDesc" class="mt-3">Movie description will appear here...</p>
                        
                        <button class="btn btn-warning mt-2" onclick="addToWatchlist()">➕ Add to My Watchlist</button>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5>Write a Review</h5>
                        <form id="reviewForm">
                            <div class="mb-3">
                                <label class="form-label">Rating (1 to 5 Stars)</label>
                                <input type="number" id="rating" class="form-control" min="1" max="5" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Your Review</label>
                                <textarea id="reviewText" class="form-control" rows="2" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Submit Review</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <h4 class="mb-3">User Reviews</h4>
                <div id="reviewsList">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // Get the movie ID from the URL (e.g., movie-details.html?id=123)
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');
        const userEmail = localStorage.getItem('loggedInUser');

        if (!userEmail) window.location.href = 'index.html';

        // 1. Fetch movie info from backend
        async function loadMovie() {
            const response = await fetch('https://movie-rec-system-oanl.onrender.com/api/movies');
            const movies = await response.json();
            
            // Find the specific movie from the list
            const movie = movies.find(m => m.id === movieId);
            if (movie) {
                document.getElementById('movieTitle').innerText = movie.title;
                document.getElementById('movieGenre').innerText = movie.genre;
                document.getElementById('movieYear').innerText = movie.year;
                document.getElementById('movieDesc').innerText = movie.description;
            }
        }

        // 2. Fetch reviews for this movie
        async function loadReviews() {
            const response = await fetch('https://movie-rec-system-oanl.onrender.com/api/reviews/movie/' + movieId);
            const reviews = await response.json();
            const reviewsList = document.getElementById('reviewsList');
            
            if (reviews.length === 0) {
                reviewsList.innerHTML = '<p class="text-muted">No reviews yet. Be the first!</p>';
                return;
            }

            let html = '';
            reviews.forEach(r => {
                html += `
                    <div class="card mb-2 shadow-sm">
                        <div class="card-body py-2">
                            <h6 class="mb-1 text-primary">${r.userId}</h6>
                            <span class="text-warning">⭐ ${r.rating}/5</span>
                            <p class="mb-0 small">${r.reviewText}</p>
                        </div>
                    </div>`;
            });
            reviewsList.innerHTML = html;
        }

        // 3. Submit a new review
        document.getElementById('reviewForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const reviewData = {
                movieId: movieId,
                userId: userEmail, // Using email as user ID for simplicity
                rating: parseInt(document.getElementById('rating').value),
                reviewText: document.getElementById('reviewText').value
            };

            await fetch('https://movie-rec-system-oanl.onrender.com/api/reviews', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(reviewData)
            });

            alert('Review added successfully!');
            document.getElementById('reviewForm').reset();
            loadReviews(); // Refresh the review list
        });

        // 4. Add to Watchlist
        async function addToWatchlist() {
            await fetch('https://movie-rec-system-oanl.onrender.com/api/watchlist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: userEmail, movieId: movieId })
            });
            alert('Added to Watchlist successfully!');
        }

        // Run functions when page loads
        window.onload = function() {
            loadMovie();
            loadReviews();
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
