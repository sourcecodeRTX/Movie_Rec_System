<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Movie Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">MovieRec Platform</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mobileMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="mobileMenu">

               <ul class="navbar-nav ms-auto align-items-center mt-3 mt-lg-0 pb-2 pb-lg-0">
    <li class="nav-item me-lg-3 mb-2 mb-lg-0">
        <span class="navbar-text d-none d-lg-block" id="userDisplay">Welcome!</span>
    </li>
    
    <li class="nav-item mb-2 mb-lg-0 me-lg-3 w-100">
        <a href="watchlist.html" class="btn btn-warning btn-sm w-100 px-3 text-nowrap">My Watchlist</a>
    </li>
    <li class="nav-item mb-2 mb-lg-0 me-lg-3 w-100">
        <a href="discover.html" class="btn btn-success btn-sm text-white w-100 px-3 text-nowrap">Discover</a>
    </li>
    
    <li class="nav-item mb-2 mb-lg-0 me-lg-3 w-100" id="adminNavBtn">
        <button class="btn btn-info text-white btn-sm w-100 px-3 text-nowrap" onclick="verifyPin()">Admin</button>
    </li>
    
    <li class="nav-item mb-2 mb-lg-0 me-lg-3 w-100" id="addMovieNavBtn" style="display: none;">
        <a href="add-movie.html" class="btn btn-info text-white btn-sm w-100 px-3 text-nowrap">Add New Movie</a>
    </li>
    
    <li class="nav-item mt-2 mt-lg-0 w-100">
        <button class="btn btn-danger btn-sm w-100 px-4 text-nowrap" onclick="logoutAdmin()">Logout</button>
    </li>
</ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h4 class="mb-3">Platform Analytics</h4>
        <div class="row text-center mb-5">
            <div class="col-md-3">
                <div class="card text-white bg-primary mb-3 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Total Users</h5>
                        <h2 id="totalUsers">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-success mb-3 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Total Movies</h5>
                        <h2 id="totalMovies">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-warning mb-3 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Total Reviews</h5>
                        <h2 id="totalReviews">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-danger mb-3 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Top Genre</h5>
                        <h2 id="topGenre">-</h2>
                    </div>
                </div>
            </div>
        </div>

        <h4 class="mb-3">Movie Catalog</h4>
        <div class="row" id="movieGrid">
            </div>
    </div>

    <script>
        
        // Authenticate user on page load
const userEmail = localStorage.getItem('loggedInUser');

if (!userEmail) {
    window.location.href = 'index.html';
} else {
    document.getElementById('userDisplay').innerText = "Welcome, " + userEmail;
}

// Toggle buttons based on admin status
if (localStorage.getItem('isAdmin') === 'true') {
    document.getElementById('adminNavBtn').style.display = 'none';
    document.getElementById('addMovieNavBtn').style.display = 'block';
}

// Function to verify the 6-digit admin PIN
function verifyPin() {
    const pin = prompt("Enter 6-digit Admin PIN:");
    
    // Check if input matches the Base64 encoded PIN
    if (pin && btoa(pin) === 'OTA1NjMz') {
        localStorage.setItem('isAdmin', 'true');
        window.location.reload(); // Reload to update navbar UI
    } else if (pin) {
        alert("Security Alert: Incorrect PIN!");
    }
}

// Logout function to clear session and admin status
function logoutAdmin() {
    localStorage.removeItem('loggedInUser');
    localStorage.removeItem('isAdmin');
    window.location.href = 'index.html';
}

        // 2. Logout function
        function logout() {
            localStorage.removeItem('loggedInUser');
            window.location.href = 'index.html';
        }

        // 3. Load Dashboard Analytics
        async function loadDashboard() {
            try {
                const response = await fetch('https://movie-rec-system-oanl.onrender.com/api/analytics/dashboard');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('totalUsers').innerText = data.totalUsers;
                    document.getElementById('totalMovies').innerText = data.totalMovies;
                    document.getElementById('totalReviews').innerText = data.totalReviews;
                    document.getElementById('topGenre').innerText = data.topGenre;
                }
            } catch (error) {
                console.error('Error loading analytics:', error);
            }
        }

        // 4. Load Movies into the Grid
        async function loadMovies() {
            try {
                const response = await fetch('https://movie-rec-system-oanl.onrender.com/api/movies');
                if (response.ok) {
                    const movies = await response.json();
                    const movieGrid = document.getElementById('movieGrid');
                    
                    if (movies.length === 0) {
                        movieGrid.innerHTML = '<p class="text-muted">No movies available. Please add some from the backend!</p>';
                        return;
                    }

                    movies.forEach(movie => {
                        // Create a card for each movie
                        const movieCard = `
                            <div class="col-6 col-md-4 col-lg-3 mb-4">
                                <div class="card h-100 shadow-sm">
                                    <img src="${movie.posterUrl}" class="card-img-top" alt="Movie Poster" style="height: 350px; object-fit: cover;">
                                    <div class="card-body">
                                        <h5 class="card-title">${movie.title}</h5>
                                        <p class="card-text text-muted mb-1">${movie.year} | ${movie.genre}</p>
                                        <p class="card-text small text-truncate">${movie.description}</p>
                                    </div>
                                    <div class="card-footer bg-white border-top-0 pb-3">
                                        <a href="movie-details.html?id=${movie.id}" class="btn btn-outline-primary btn-sm w-100">View Details & Reviews</a>
                                    </div>
                                </div>
                            </div>
                        `;
                        movieGrid.innerHTML += movieCard;
                    });
                }
            } catch (error) {
                console.error('Error loading movies:', error);
            }
        }

        // Run data fetching when the page completely loads
        window.onload = function() {
            loadDashboard();
            loadMovies();
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
