<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover Movies - Movie Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">MovieRec Platform</a>
            <div class="d-flex">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
                <a href="watchlist.html" class="btn btn-warning btn-sm me-2">My Watchlist</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        
        <div class="card shadow-sm mb-5">
            <div class="card-body text-center p-4">
                <h3 class="mb-3">Search Movies</h3>
                <div class="input-group w-75 mx-auto">
                    <input type="text" id="searchInput" class="form-control" placeholder="Type a movie name...">
                    <button class="btn btn-primary" onclick="searchMovies()">Search</button>
                </div>
                <div class="row mt-4 text-start" id="searchResults">
                    </div>
            </div>
        </div>

        <h4 class="mb-3 text-danger">🔥 Trending Now</h4>
        <div class="row mb-5" id="trendingGrid">
            </div>

        <h4 class="mb-3 text-success">✨ Recommended For You</h4>
        <div class="row mb-5" id="recommendedGrid">
            </div>

    </div>

    <script>
        const userEmail = localStorage.getItem('loggedInUser');
        if (!userEmail) window.location.href = 'index.html';

        // Helper function to create movie cards
        function createMovieCard(movie) {
            return `
                <div class="col-6 col-md-4 col-lg-3 mb-4">
                    <div class="card h-100 shadow-sm">
                        <img src="${movie.posterUrl}" class="card-img-top" alt="Poster" style="height: 300px; object-fit: cover;">
                        <div class="card-body">
                            <h6 class="card-title">${movie.title}</h6>
                            <p class="card-text text-muted small">${movie.year} | ${movie.genre}</p>
                            <a href="movie-details.html?id=${movie.id}" class="btn btn-outline-primary btn-sm w-100">View Details</a>
                        </div>
                    </div>
                </div>
            `;
        }

        // 1. Search Movies
        async function searchMovies() {
            const title = document.getElementById('searchInput').value;
            if (!title) return; // Do nothing if search box is empty

            try {
                const response = await fetch(`https://movie-rec-system-oanl.onrender.com/api/movies/search?title=${title}`);
                const movies = await response.json();
                const resultsDiv = document.getElementById('searchResults');
                
                if (movies.length === 0) {
                    resultsDiv.innerHTML = '<p class="text-muted text-center w-100">No movies found.</p>';
                    return;
                }

                let html = '';
                movies.forEach(m => html += createMovieCard(m));
                resultsDiv.innerHTML = html;
            } catch (error) {
                console.error('Search error:', error);
            }
        }

        // 2. Load Trending Movies
        async function loadTrending() {
            try {
                const response = await fetch('https://movie-rec-system-oanl.onrender.com/api/trending');
                const movies = await response.json();
                const grid = document.getElementById('trendingGrid');
                
                if (movies.length === 0) {
                    grid.innerHTML = '<p class="text-muted px-3">Not enough reviews to show trending movies yet.</p>';
                    return;
                }

                let html = '';
                movies.forEach(m => html += createMovieCard(m));
                grid.innerHTML = html;
            } catch (error) {
                console.error('Trending error:', error);
            }
        }

        // 3. Load Recommendations
        async function loadRecommendations() {
            try {
                const response = await fetch(`https://movie-rec-system-oanl.onrender.com/api/recommendations/user/${userEmail}`);
                const movies = await response.json();
                const grid = document.getElementById('recommendedGrid');
                
                if (movies.length === 0) {
                    grid.innerHTML = '<p class="text-muted px-3">Write some reviews to get personalized recommendations!</p>';
                    return;
                }

                let html = '';
                movies.forEach(m => html += createMovieCard(m));
                grid.innerHTML = html;
            } catch (error) {
                console.error('Recommendations error:', error);
            }
        }

        // Run functions when page loads
        window.onload = function() {
            loadTrending();
            loadRecommendations();
        };

        document.getElementById('searchInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') searchMovies();
});
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
