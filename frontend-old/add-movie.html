<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Movie - Movie Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">MovieRec Platform</a>
            <div class="d-flex">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm me-2">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">Add a New Movie</h3>
                        
                        <form id="addMovieForm">
                            <div class="mb-3">
                                <label class="form-label">Movie Title</label>
                                <input type="text" id="title" class="form-control" required placeholder="e.g. Interstellar">
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Genre</label>
                                    <input type="text" id="genre" class="form-control" required placeholder="e.g. Sci-Fi">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Release Year</label>
                                    <input type="number" id="year" class="form-control" required placeholder="e.g. 2014">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Poster Image URL</label>
                                <input type="url" id="posterUrl" class="form-control" required placeholder="https://link-to-image.jpg">
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Short Description</label>
                                <textarea id="description" class="form-control" rows="3" required placeholder="What is the movie about?"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Save Movie to Database</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check if user is logged in
        const userEmail = localStorage.getItem('loggedInUser');
        if (!userEmail) {
            window.location.href = 'index.html';
        }

        document.getElementById('addMovieForm').addEventListener('submit', async function(event) {
            event.preventDefault(); // Stop page from reloading
            
            // Collect all data from the form
            const movieData = {
                title: document.getElementById('title').value,
                genre: document.getElementById('genre').value,
                year: parseInt(document.getElementById('year').value),
                posterUrl: document.getElementById('posterUrl').value,
                description: document.getElementById('description').value
            };

            try {
                // Send a POST request to our Spring Boot backend
                const response = await fetch('https://movie-rec-system-oanl.onrender.com/api/movies', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(movieData)
                });

                if (response.ok) {
                    alert('Movie added successfully!');
                    window.location.href = 'dashboard.html'; // Go back to dashboard to see the new movie
                } else {
                    alert('Failed to add movie. Please check your details.');
                }
            } catch (error) {
                alert('Error connecting to the server.');
                console.error(error);
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
